name: Neon Branch Cleanup (Fallback)

on:
  pull_request:
    types: [closed]
    branches: [develop]
  workflow_dispatch:

env:
  NEON_PROJECT_ID: sweet-haze-72592464

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Clean up orphaned E2E branches
        run: |
          echo "🧹 Limpando branches Neon órfãs..."

          # List all e2e-* branches (should be auto-deleted by TTL after 1h)
          # This is a fallback in case a branch creation failed mid-test
          BRANCHES=$(curl -s \
            "https://api.neon.tech/api/v1/projects/${{ env.NEON_PROJECT_ID }}/branches" \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
            | jq -r '.branches[] | select(.name | startswith("e2e-")) | .id')

          if [ -z "$BRANCHES" ]; then
            echo "✓ Nenhuma branch órfã encontrada"
            exit 0
          fi

          echo "Encontradas branches órfãs: $BRANCHES"

          for BRANCH_ID in $BRANCHES; do
            echo "🗑️  Deletando branch: $BRANCH_ID"
            curl -s -X DELETE \
              "https://api.neon.tech/api/v1/projects/${{ env.NEON_PROJECT_ID }}/branches/$BRANCH_ID" \
              -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" || true
          done

          echo "✓ Limpeza concluída"
