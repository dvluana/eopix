name: Neon Branch Cleanup

on:
  pull_request:
    types: [closed]
    branches: [develop]

env:
  NEON_PROJECT_ID: sweet-haze-72592464

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Delete Neon CI branches for this PR
        run: |
          echo "Cleaning up Neon branches for PR #${{ github.event.pull_request.number }}"

          # List all branches and filter CI ones
          BRANCHES=$(curl -s \
            "https://console.neon.tech/api/v2/projects/${{ env.NEON_PROJECT_ID }}/branches" \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
            | jq -r '.branches[] | select(.name | startswith("ci/")) | .id')

          if [ -z "$BRANCHES" ]; then
            echo "No CI branches found to clean up"
            exit 0
          fi

          for BRANCH_ID in $BRANCHES; do
            echo "Deleting branch: $BRANCH_ID"
            curl -s -X DELETE \
              "https://console.neon.tech/api/v2/projects/${{ env.NEON_PROJECT_ID }}/branches/$BRANCH_ID" \
              -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" || true
          done

          echo "Cleanup complete"
