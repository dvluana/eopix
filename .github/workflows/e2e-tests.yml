name: E2E Tests

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Test mode'
        type: choice
        options:
          - mock
          - integration
          - all
        default: mock
  schedule:
    - cron: '0 3 * * *' # Nightly 03:00 UTC

env:
  NEON_PROJECT_ID: sweet-haze-72592464
  NODE_VERSION: '20'

jobs:
  e2e-mock:
    # Mock mode: Fast tests with mocked APIs (every PR/push)
    name: E2E Tests (MOCK)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests (MOCK mode)
        run: npm run test:e2e:mock
        env:
          MOCK_MODE: 'true'
          JWT_SECRET: e2e-test-secret-not-for-production
          ADMIN_EMAILS: e2e-admin@eopix.test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-mock
          path: playwright-report/
          retention-days: 7

  e2e-integration:
    # Integration mode: Real DB with Neon branch (nightly + manual)
    name: E2E Tests (INTEGRATION)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run on nightly schedule, manual dispatch with integration/all, or manual input
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.mode == 'integration' || github.event.inputs.mode == 'all'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests (INTEGRATION with real Neon branch)
        run: npm run test:e2e
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ env.NEON_PROJECT_ID }}
          TEST_MODE: 'true'
          JWT_SECRET: e2e-test-secret-not-for-production
          ADMIN_EMAILS: e2e-admin@eopix.test
          # API keys (only needed for TEST_MODE)
          APIFULL_API_KEY: ${{ secrets.APIFULL_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CI: 'true'

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-integration
          path: playwright-report/
          retention-days: 7
